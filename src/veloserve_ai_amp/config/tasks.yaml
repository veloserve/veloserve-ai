route_task:
  description: >
    Review this incoming task for the VeloServe ecosystem:

    Task type:
    {task_type}

    Repo scope:
    {repo_scope}

    Segment:
    {segment}

    Target:
    {target}

    Goal:
    {goal}

    Requested artifacts:
    {artifacts_required_text}

    Context URLs:
    {context_urls_text}

    Notes:
    {notes_text}

    Constraints:
    {constraints}

    Scope lock rules:
    {scope_lock_rules}

    Output contract for downstream tasks:
    {artifact_output_contract}

    Using the shared product context, decide which VeloServe repo or crew should own the work,
    summarize the task in a clean engineering brief, preserve the requested scope and artifact names,
    and call out any missing assumptions.
  expected_output: >
    A markdown routing brief with suggested owning repo, suggested crew, summary of the request,
    requested artifacts, and important assumptions. If scope should be narrowed, explain it explicitly.
  agent: intake_router

plan_task:
  description: >
    Based on the routed brief, create a practical implementation plan for this request.
    The request shape is:

    - Task type: {task_type}
    - Repo scope: {repo_scope}
    - Segment: {segment}
    - Target: {target}
    - Goal: {goal}
    - Requested artifacts: {artifacts_required_text}
    - Context URLs:
    {context_urls_text}
    - Notes: {notes_text}

    Keep the work small and reviewable, identify dependencies, and stay within these constraints:
    {constraints}

    Scope lock rules:
    {scope_lock_rules}

    Output contract:
    {artifact_output_contract}
  expected_output: >
    A markdown implementation plan with ordered steps, repo scope, validation approach, and what success looks like.
    Preserve the requested scope and artifacts. If you recommend a smaller first PR, keep the broader scope visible
    and explain the split explicitly.
    Success definition:
    {success_definition}
    Required artifacts:
    {artifacts_required_text}
  agent: implementation_planner

review_task:
  description: >
    Review the proposed implementation plan for auth, billing, secrets, ownership checks,
    destructive paths, and product-boundary risk. Mark what is safe for autonomous work and what needs human approval.
    Review it in the context of:
    - Task type: {task_type}
    - Repo scope: {repo_scope}
    - Segment: {segment}
    - Target: {target}
    - Requested artifacts: {artifacts_required_text}
    - Context URLs:
    {context_urls_text}
    - Notes: {notes_text}

    Scope lock rules:
    {scope_lock_rules}

    Output contract:
    {artifact_output_contract}

    Explicitly flag any scope drift between the original request and the proposed plan.
  expected_output: >
    A markdown QA and safety review with risks, approval gates, scope-drift notes, and a final go/no-go recommendation.
  agent: qa_gatekeeper
